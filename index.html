<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Zombie Waves 3D</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1d3b5c;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,.55);
      border: 3px solid #fff;
      border-radius: 10px;
      padding: 6px 10px;
      font: bold 14px 'Arial';
      color: #fff;
      pointer-events: none;
      z-index: 10;
    }
    .touchBtn {
      position: absolute;
      border-radius: 50%;
      border: 4px solid #000;
      font: bold 18px Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    #hitBtn {
      bottom: 40px;
      left: 20px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #ff9b3d, #ff4a00);
    }
    #jumpBtn {
      bottom: 40px;
      right: 20px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #ffffff, #ffd86a);
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div class="hud" id="hud">HEALTH: 100</div>
  <button id="hitBtn" class="touchBtn">HIT</button>
  <button id="jumpBtn" class="touchBtn">JUMP</button>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>

  <!-- Our modules -->
  <script src="js/map.js"></script>
  <script src="js/player.js"></script>
  <script src="js/zombie.js"></script>

  <script>
    // Game state
    let game = {
      wave: 1,
      kills: 0,
      health: 100,
      mapObjects: [],
      zombies: [],
      move: { x: 0, y: 0 },
      isJumping: false,
      hitPressed: false
    };

    // Initialize
    initMap();
    initPlayer();
    spawnWave(game.wave);

    // Update HUD
    function updateHUD() {
      document.getElementById("hud").innerHTML = `
        HEALTH: ${game.health}
        WAVE: ${game.wave}
        KILLS: ${game.kills}
      `;
    }
    updateHUD();
  </script>
</body>
</html>
