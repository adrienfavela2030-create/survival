<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Zombie Waves 3D</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1d3b5c;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,.55);
      border: 3px solid #fff;
      border-radius: 10px;
      padding: 6px 10px;
      font: bold 14px 'Arial';
      color: #fff;
      pointer-events: none;
      z-index: 10;
    }
    .touchBtn {
      position: fixed;
      border-radius: 50%;
      border: 4px solid #000;
      font: bold 18px Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      z-index: 20;
    }
    #jumpBtn {
      bottom: 30px;
      right: 30px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #ffffff, #ffd86a);
    }
    #hitBtn {
      bottom: 36px;
      right: 140px;
      width: 76px;
      height: 76px;
      background: radial-gradient(circle, #ff9b3d, #ff4a00);
      font-size: 16px;
    }
    #stickBase {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      border: 4px solid rgba(0,0,0,.35);
      touch-action: none;
    }
    #stickKnob {
      position: absolute;
      left: 25px;
      top: 25px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(#59d6ff, #0d6cff);
      border: 3px solid #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div class="hud" id="hud">HEALTH: 100</div>

  <!-- Joystick -->
  <div id="stickBase">
    <div id="stickKnob"></div>
  </div>

  <!-- Buttons -->
  <button id="hitBtn" class="touchBtn">HIT</button>
  <button id="jumpBtn" class="touchBtn">JUMP</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  <script>
    // Game state
    let scene, camera, renderer;
    let player, zombies = [], rocks = [];
    const game = {
      health: 100,
      kills: 0,
      move: { x: 0, y: 0 },
      hitPressed: false,
      isJumping: false
    };

    function updateHUD() {
      document.getElementById("hud").innerHTML = `
        HEALTH: ${game.health}<br>
        KILLS: ${game.kills}
      `;
    }

    // --- CREATE MAP (GROUND + ROCKS) ---
    function createMap() {
      // Ground
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshLambertMaterial({ color: 0x88cc66 })
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      // Random rocks (blocky 3D rocks)
      const rockMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
      for (let i = 0; i < 20; i++) {
        const x = (Math.random() - 0.5) * 80;
        const z = (Math.random() - 0.5) * 80;
        const size = 1.5 + Math.random() * 0.8;

        const rock = new THREE.Mesh(
          new THREE.BoxGeometry(size, size * 0.7, size),
          rockMat
        );
        rock.position.set(x, rock.geometry.parameters.height / 2, z);
        rock.rotation.y = Math.random() * Math.PI;
        scene.add(rock);
        rocks.push(rock);
      }
    }

    // --- ZOMBIES (ALSO CREATED BY CODE) ---
    function createZombies() {
      const zMat = new THREE.MeshLambertMaterial({ color: 0x55aa55 });
      for (let i = 0; i < 6; i++) {
        const z = new THREE.Mesh(
          new THREE.BoxGeometry(1, 2, 1),
          zMat
        );
        const r = 20;
        z.position.set(
          (Math.random() - 0.5) * 2 * r,
          1,
          (Math.random() - 0.5) * 2 * r
        );
        scene.add(z);
        zombies.push(z);
      }
    }

    // --- JOYSTICK & BUTTONS ---
    let tracking = false;
    const stickBase = document.getElementById("stickBase");
    const stickKnob = document.getElementById("stickKnob");
    const radius = 25;

    stickBase.addEventListener("touchstart", e => {
      e.preventDefault();
      tracking = true;
    });

    document.addEventListener("touchmove", e => {
      if (!tracking) return;
      e.preventDefault();
      const rect = stickBase.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const tx = e.touches[0].clientX;
      const ty = e.touches[0].clientY;
      let dx = tx - cx;
      let dy = ty - cy;
      const len = Math.hypot(dx, dy);
      if (len > radius) {
        const ang = Math.atan2(dy, dx);
        dx = Math.cos(ang) * radius;
        dy = Math.sin(ang) * radius;
      }
      stickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
      game.move.x = dx / radius;
      game.move.y = dy / radius;
    }, { passive: false });

    document.addEventListener("touchend", () => {
      tracking = false;
      game.move.x = 0;
      game.move.y = 0;
      stickKnob.style.transform = "translate(0px, 0px)";
    });

    // Buttons
    document.getElementById("hitBtn").addEventListener("touchstart", () => game.hitPressed = true);
    document.getElementById("hitBtn").addEventListener("touchend", () => game.hitPressed = false);
    document.getElementById("jumpBtn").addEventListener("touchstart", () => {
      if (!game.isJumping) game.isJumping = true;
    });

    // --- PLAYER ---
    function createPlayer() {
      player = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshLambertMaterial({ color: 0xff4444 })
      );
      player.position.y = 1;
      scene.add(player);
    }

    function updatePlayer() {
      const speed = 0.22;
      const dx = game.move.x * speed;
      const dz = game.move.y * speed;

      // Check collision with rocks (very simple: stay in same position if it would overlap)
      const nextX = player.position.x + dx;
      const nextZ = player.position.z + dz;
      let canMoveX = true, canMoveZ = true;

      for (let rock of rocks) {
        const d = Math.hypot(
          rock.position.x - nextX,
          rock.position.z - nextZ
        );
        if (d < 2) {
          if (Math.abs(rock.position.x - player.position.x) < Math.abs(rock.position.z - player.position.z)) {
            canMoveX = false;
          } else {
            canMoveZ = false;
          }
          break;
        }
      }

      if (canMoveX) player.position.x = nextX;
      if (canMoveZ) player.position.z = nextZ;

      // Jump
      if (game.isJumping) {
        player.position.y = Math.min(player.position.y + 0.18, 1.8);
        if (player.position.y >= 1.7) game.isJumping = false;
      } else {
        if (player.position.y > 1) player.position.y -= 0.1;
      }

      // HIT LOGIC
      if (game.hitPressed) {
        const range = 2;
        for (let z of zombies) {
          const d = player.position.distanceTo(z.position);
          if (d < range) {
            game.kills++;
            scene.remove(z);
            zombies.splice(zombies.indexOf(z), 1);
            updateHUD();
            break;
          }
        }
      }

      // Keep camera on player
      camera.position.copy(player.position);
      camera.position.y = 5;
      camera.position.z = 10;
      camera.lookAt(player.position);
    }

    // --- INIT THREE.JS + RUN ---
    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x7ec8ff);

      const fov = 75;
      const aspect = window.innerWidth / window.innerHeight;
      camera = new THREE.PerspectiveCamera(fov, aspect, 0.1, 1000);
      camera.position.set(0, 5, 10);
      camera.lookAt(0, 1, 0);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("gameCanvas"), antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

      window.addEventListener("resize", () => {
        const w = window.innerWidth;
        const h = window.innerHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      });

      // Lighting
      const sun = new THREE.DirectionalLight(0xffffff, 1.2);
      sun.position.set(10, 20, 8);
      scene.add(sun);
      scene.add(new THREE.AmbientLight(0x8fb3ff, 0.4));

      createMap();
      createPlayer();
      createZombies();

      animate();
      updateHUD();
    }

    function animate() {
      requestAnimationFrame(animate);
      updatePlayer();
      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
