<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Zombie Waves Retro</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05060a;
      font-family: "Arial Black", Arial, sans-serif;
      touch-action: none;
    }
    canvas { display: block; image-rendering: pixelated; }

    #ui { position: fixed; inset: 0; pointer-events: none; color: #fff; }
    #hud {
      position: absolute; top: 10px; left: 10px;
      background: rgba(0,0,0,.78);
      border: 3px solid #00ff99;
      box-shadow: 0 0 12px rgba(0,255,153,.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      text-shadow: 0 2px 0 #000;
    }
    #centerMsg {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,.85);
      border: 3px solid #ff4df2;
      padding: 12px 18px;
      border-radius: 10px;
      display: none;
      text-align: center;
      text-shadow: 0 2px 0 #000;
      max-width: 90vw;
    }
    #shop {
      position: absolute; right: 10px; top: 10px;
      width: min(280px, calc(100vw - 20px));
      background: rgba(0,0,0,.8);
      border: 3px solid #ffd54a;
      box-shadow: 0 0 12px rgba(255,213,74,.25);
      padding: 12px;
      border-radius: 10px;
      display: none;
      pointer-events: auto;
    }
    #shop h3 { margin: 0 0 10px 0; color: #ffd54a; }
    #shop button, #startBtn {
      width: 100%;
      margin: 6px 0;
      padding: 12px;
      border: 3px solid #000;
      border-radius: 8px;
      background: linear-gradient(#ff6b6b, #cc2b2b);
      color: #fff;
      font-weight: 900;
      letter-spacing: .5px;
      cursor: pointer;
      box-shadow: 0 4px 0 #7a1010;
    }

    #hotbar {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: none;
    }
    .slot {
      width: 92px;
      height: 50px;
      border: 3px solid rgba(255,255,255,.35);
      background: rgba(0,0,0,.75);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      text-align: center;
      box-shadow: 0 0 0 2px rgba(0,0,0,.4) inset;
    }
    .slot.active {
      border-color: #ffea00;
      box-shadow: 0 0 12px rgba(255,234,0,.5);
    }

    #overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle, rgba(33,10,60,.25), rgba(0,0,0,.92));
      color: #fff;
      text-align: center;
      z-index: 10;
    }
    #overlay .card {
      width: min(560px, 92vw);
      background: rgba(0,0,0,.8);
      border: 4px solid #00ff99;
      box-shadow: 0 0 22px rgba(0,255,153,.2);
      border-radius: 14px;
      padding: 22px;
    }
    #overlay h1 { margin: 0 0 10px 0; color: #00ff99; }
    #overlay p { margin: 10px 0 18px 0; font-size: 15px; line-height: 1.5; }

    #touchUI {
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: none;
    }
    #stickBase {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(0,0,0,.35);
      border: 4px solid rgba(255,255,255,.25);
      pointer-events: auto;
    }
    #stickKnob {
      position: absolute;
      left: 36px;
      top: 36px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(#00e5ff, #006dff);
      border: 3px solid #000;
    }
    .touchBtn {
      position: absolute;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 4px solid #000;
      color: #fff;
      font-weight: 900;
      text-shadow: 0 2px 0 #000;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      user-select: none;
      box-shadow: 0 6px 0 rgba(0,0,0,.35);
    }
    #attackBtn {
      right: 22px;
      bottom: 24px;
      background: radial-gradient(circle, #ff9b3d, #ff4a00);
    }
    #shopBtn {
      right: 122px;
      bottom: 28px;
      width: 70px;
      height: 70px;
      background: radial-gradient(circle, #ffe56e, #d49a00);
    }
    #lookZone {
      position: absolute;
      right: 0;
      top: 0;
      width: 55vw;
      height: 100vh;
      pointer-events: auto;
    }

    .landscapeOnly {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 900px) {
      #touchUI { display: block; }
    }
  </style>
</head>
<body>
  <div class="landscapeOnly" id="rotateScreen">
    <div>
      <h1>Rotate your device</h1>
      <p>This game is meant to be played in horizontal mode.</p>
    </div>
  </div>

  <div id="overlay">
    <div class="card">
      <h1>Zombie Waves Retro</h1>
      <p>
        PC: WASD move, mouse look, click attack, 1-3 hotbar, B shop, H start/restart.<br>
        Phone/iPad: joystick move, right side drag to look, tap attack/shop.
      </p>
      <button id="startBtn">Start Game</button>
    </div>
  </div>

  <div id="ui">
    <div id="hud"></div>
    <div id="centerMsg"></div>

    <div id="shop">
      <h3>SHOP</h3>
      <div id="shopInfo" style="font-size:13px; margin-bottom:8px;"></div>
      <button id="buySword">Buy Sword - 50</button>
      <button id="buyGun">Buy Blaster - 120</button>
      <button id="buyArmor">Buy Armor - 80</button>
      <button id="closeShop">Close</button>
    </div>

    <div id="hotbar">
      <div class="slot active" id="slot1">1 Fists</div>
      <div class="slot" id="slot2">2 Empty</div>
      <div class="slot" id="slot3">3 Empty</div>
    </div>

    <div id="touchUI">
      <div id="stickBase"><div id="stickKnob"></div></div>
      <div id="shopBtn" class="touchBtn">SHOP</div>
      <div id="attackBtn" class="touchBtn">HIT</div>
      <div id="lookZone"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  <script>
    let scene, camera, renderer, clock;
    let player;
    let zombies = [], bullets = [], coins = [];
    let gameRunning = false, gameOver = false, shopOpen = false;
    let wave = 1, kills = 0, coinsCount = 0, health = 100, maxHealth = 100, armor = 0;
    let selectedWeapon = 1;
    let yaw = 0, pitch = 0, lastHitTime = 0;
    let unlockedSword = false, unlockedGun = false;
    let lastSpawnTime = 0;

    const keys = {};
    const move = { x: 0, y: 0 };
    const weapons = {
      1: { name: "Fists", damage: 15, range: 2.3, cooldown: 420 },
      2: { name: "Sword", damage: 30, range: 3.2, cooldown: 320 },
      3: { name: "Blaster", damage: 20, range: 100, cooldown: 170 }
    };

    const hud = () => document.getElementById("hud");
    const centerMsg = () => document.getElementById("centerMsg");
    const shop = () => document.getElementById("shop");
    const rotateScreen = () => document.getElementById("rotateScreen");

    function zombieStats() {
      return { health: 25 + wave * 10, speed: 0.30 + wave * 0.035, damage: 6 + wave * 2 };
    }

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x10131f);
      scene.fog = new THREE.Fog(0x10131f, 18, 100);

      camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.25));
      renderer.setSize(innerWidth, innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.domElement.style.imageRendering = "pixelated";
      document.body.appendChild(renderer.domElement);
      clock = new THREE.Clock();

      const dir = new THREE.DirectionalLight(0xffffff, 1.2);
      dir.position.set(10, 18, 8);
      scene.add(dir);
      scene.add(new THREE.AmbientLight(0x8fb3ff, 0.45));

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(500, 500, 1, 1),
        new THREE.MeshLambertMaterial({ color: 0x24301f })
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      const grid = new THREE.GridHelper(500, 80, 0x00ff99, 0x223322);
      grid.position.y = 0.01;
      scene.add(grid);

      player = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshLambertMaterial({ color: 0xf2f2f2 })
      );
      player.position.set(0, 1, 0);
      scene.add(player);

      addBorderSceneProps();
      bindEvents();
      spawnWave();
      animate();
      updateHotbar();
      updateShopText();
    }

    function addBorderSceneProps() {
      for (let i = 0; i < 30; i++) {
        const c = new THREE.Mesh(
          new THREE.BoxGeometry(2 + Math.random() * 2, 3 + Math.random() * 5, 2 + Math.random() * 2),
          new THREE.MeshLambertMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.4, 0.35) })
        );
        const a = Math.random() * Math.PI * 2;
        const d = 28 + Math.random() * 35;
        c.position.set(Math.cos(a) * d, c.geometry.parameters.height / 2, Math.sin(a) * d);
        scene.add(c);
      }
    }

    function bindEvents() {
      const start = () => {
        document.getElementById("overlay").style.display = "none";
        startGame();
      };

      document.getElementById("startBtn").onclick = start;

      document.addEventListener("keydown", e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === "1") setWeapon(1);
        if (e.key === "2") setWeapon(2);
        if (e.key === "3") setWeapon(3);
        if (e.key.toLowerCase() === "b") toggleShop(!shopOpen);
        if (e.key.toLowerCase() === "h") {
          if (!gameRunning) start();
          else if (gameOver) resetGame();
        }
      });
      document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

      document.addEventListener("mousemove", e => {
        if (!gameRunning || shopOpen || gameOver) return;
        yaw -= e.movementX * 0.0025;
        pitch -= e.movementY * 0.0025;
        pitch = Math.max(-1.05, Math.min(1.05, pitch));
      });
      document.addEventListener("mousedown", attack);

      window.addEventListener("resize", onResize);
      window.addEventListener("orientationchange", updateOrientationUI);
      updateOrientationUI();

      document.getElementById("closeShop").onclick = () => toggleShop(false);
      document.getElementById("buySword").onclick = () => buyWeapon(2, 50);
      document.getElementById("buyGun").onclick = () => buyWeapon(3, 120);
      document.getElementById("buyArmor").onclick = buyArmorItem;
      document.getElementById("attackBtn").onclick = attack;
      document.getElementById("shopBtn").onclick = () => toggleShop(!shopOpen);

      const stickBase = document.getElementById("stickBase");
      const stickKnob = document.getElementById("stickKnob");
      let tracking = false, startX = 0, startY = 0, maxR = 32;

      const setKnob = (dx, dy) => {
        const len = Math.hypot(dx, dy);
        const clamped = Math.min(len, maxR);
        const ang = Math.atan2(dy, dx);
        const x = Math.cos(ang) * clamped;
        const y = Math.sin(ang) * clamped;
        stickKnob.style.transform = `translate(${x}px, ${y}px)`;
        move.x = x / maxR;
        move.y = y / maxR;
      };

      stickBase.addEventListener("touchstart", e => {
        tracking = true;
        const t = e.touches[0];
        const r = stickBase.getBoundingClientRect();
        startX = r.left + r.width / 2;
        startY = r.top + r.height / 2;
        setKnob(t.clientX - startX, t.clientY - startY);
      }, { passive: false });

      document.addEventListener("touchmove", e => {
        if (!tracking) return;
        const t = e.touches[0];
        setKnob(t.clientX - startX, t.clientY - startY);
        e.preventDefault();
      }, { passive: false });

      document.addEventListener("touchend", () => {
        tracking = false;
        move.x = 0; move.y = 0;
        stickKnob.style.transform = "translate(0px, 0px)";
      });

      let looking = false, lastTouchX = 0, lastTouchY = 0;
      const lookZone = document.getElementById("lookZone");
      lookZone.addEventListener("touchstart", e => {
        if (e.touches.length !== 1) return;
        looking = true;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }, { passive: false });

      document.addEventListener("touchmove", e => {
        if (!looking || e.touches.length !== 1) return;
        const t = e.touches[0];
        const dx = t.clientX - lastTouchX;
        const dy = t.clientY - lastTouchY;
        yaw -= dx * 0.004;
        pitch -= dy * 0.004;
        pitch = Math.max(-1.05, Math.min(1.05, pitch));
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        e.preventDefault();
      }, { passive: false });

      document.addEventListener("touchend", () => looking = false);
    }

    function updateOrientationUI() {
      const isPortrait = window.innerHeight > window.innerWidth;
      rotateScreen().style.display = isPortrait ? "flex" : "none";
    }

    function setWeapon(id) {
      if (id === 2 && !unlockedSword) return;
      if (id === 3 && !unlockedGun) return;
      selectedWeapon = id;
      updateHotbar();
    }

    function updateHotbar() {
      const names = [
        unlockedSword ? "1 Fists" : "1 Fists",
        unlockedSword ? "2 Sword" : "2 Empty",
        unlockedGun ? "3 Blaster" : "3 Empty"
      ];
      document.getElementById("slot1").textContent = names[0];
      document.getElementById("slot2").textContent = names[1];
      document.getElementById("slot3").textContent = names[2];

      ["slot1","slot2","slot3"].forEach((id, i) => {
        const active = selectedWeapon === i + 1;
        document.getElementById(id).classList.toggle("active", active);
      });
    }

    function showCenter(text, time = 1400) {
      centerMsg().textContent = text;
      centerMsg().style.display = "block";
      clearTimeout(showCenter.t);
      showCenter.t = setTimeout(() => centerMsg().style.display = "none", time);
    }

    function toggleShop(state) {
      if (!gameRunning || gameOver) return;
      shopOpen = state;
      shop().style.display = shopOpen ? "block" : "none";
      updateShopText();
    }

    function updateShopText() {
      document.getElementById("shopInfo").innerHTML =
        `Coins: ${coinsCount}<br>Armor: ${armor}<br>Health: ${Math.ceil(health)} / ${maxHealth}<br><br>` +
        `Sword: ${unlockedSword ? "Owned" : "Locked"}<br>Blaster: ${unlockedGun ? "Owned" : "Locked"}`;
    }

    function buyWeapon(id, price) {
      if (coinsCount < price) return showCenter("Not enough coins");
      if (id === 2) unlockedSword = true;
      if (id === 3) unlockedGun = true;
      coinsCount -= price;
      setWeapon(id);
      updateShopText();
      updateHotbar();
    }

    function buyArmorItem() {
      const price = 80;
      if (coinsCount < price) return showCenter("Not enough coins");
      coinsCount -= price;
      armor += 20;
      maxHealth += 20;
      health += 20;
      updateShopText();
    }

    function attack() {
      if (!gameRunning || shopOpen || gameOver) return;
      const now = performance.now();
      const w = weapons[selectedWeapon];
      if (now - lastHitTime < w.cooldown) return;
      lastHitTime = now;

      if (selectedWeapon === 3) return shootBullet();

      let hit = false;
      const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      zombies.forEach(z => {
        if (z.dead) return;
        const dist = z.mesh.position.distanceTo(player.position);
        if (dist < w.range + 1) {
          const dir = new THREE.Vector3().subVectors(z.mesh.position, player.position);
          dir.y = 0;
          dir.normalize();
          if (forward.dot(dir) > 0.15) {
            damageZombie(z, w.damage);
            hit = true;
          }
        }
      });
      if (!hit) showCenter("SWING!");
    }

    function shootBullet() {
      const bullet = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xfff14f })
      );
      bullet.position.copy(player.position);
      bullet.position.y = 1.6;
      const dir = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      bullet.userData = { dir, speed: 1.25, damage: weapons[3].damage };
      bullets.push(bullet);
      scene.add(bullet);
    }

    function damageZombie(z, amount) {
      z.health -= amount;
      z.mesh.material.color.setHex(0xff3b3b);
      setTimeout(() => { if (!z.dead) z.mesh.material.color.setHex(0x55aa55); }, 70);
      if (z.health <= 0) killZombie(z);
    }

    function killZombie(z) {
      z.dead = true;
      scene.remove(z.mesh);
      kills++;
      const drop = 10 + Math.floor(Math.random() * 15);
      const coin = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 0.08, 10),
        new THREE.MeshLambertMaterial({ color: 0xffd84d })
      );
      coin.rotation.x = Math.PI / 2;
      coin.position.copy(z.mesh.position);
      coin.position.y = 0.2;
      coin.userData = { value: drop };
      coins.push(coin);
      scene.add(coin);
      zombies = zombies.filter(x => !x.dead);
    }

    function randomSpawnPoint() {
      const radius = 18 + Math.random() * 22;
      const angle = Math.random() * Math.PI * 2;
      return new THREE.Vector3(
        player.position.x + Math.cos(angle) * radius,
        1,
        player.position.z + Math.sin(angle) * radius
      );
    }

    function spawnWave() {
      const count = 3 + wave * 2;
      for (let i = 0; i < count; i++) {
        const s = zombieStats();
        const m = new THREE.Mesh(
          new THREE.BoxGeometry(1, 2, 1),
          new THREE.MeshLambertMaterial({ color: 0x55aa55 })
        );
        m.position.copy(randomSpawnPoint());
        scene.add(m);
        zombies.push({ mesh: m, health: s.health, speed: s.speed, damage: s.damage, attackCd: 0, dead: false });
      }
      showCenter(`WAVE ${wave}`);
    }

    function nextWave() {
      wave++;
      showCenter(`WAVE ${wave} START!`);
      spawnWave();
    }

    function damagePlayer(amount) {
      const finalDamage = Math.max(1, amount - armor * 0.15);
      health -= finalDamage;
      if (health <= 0) {
        health = 0;
        gameOver = true;
        showCenter("YOU DIED - PRESS H", 999999);
      }
      updateShopText();
    }

    function resetGame() {
      zombies.forEach(z => scene.remove(z.mesh));
      bullets.forEach(b => scene.remove(b));
      coins.forEach(c => scene.remove(c));
      zombies = []; bullets = []; coins = [];
      wave = 1; kills = 0; coinsCount = 0; health = 100; maxHealth = 100; armor = 0;
      unlockedSword = false; unlockedGun = false;
      selectedWeapon = 1; gameOver = false; shopOpen = false;
      toggleShop(false);
      updateHotbar();
      spawnWave();
      showCenter("RESTARTED");
    }

    function startGame() {
      if (gameRunning) return;
      gameRunning = true;
      showCenter("FIGHT!");
    }

    function onResize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      updateOrientationUI();
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      if (gameRunning && !gameOver && !shopOpen) {
        const speed = 0.11;
        const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
        const right = new THREE.Vector3(forward.z, 0, -forward.x);

        if (keys["w"]) player.position.addScaledVector(forward, speed);
        if (keys["s"]) player.position.addScaledVector(forward, -speed);
        if (keys["a"]) player.position.addScaledVector(right, -speed);
        if (keys["d"]) player.position.addScaledVector(right, speed);

        player.position.addScaledVector(forward, move.y * -0.10);
        player.position.addScaledVector(right, move.x * 0.10);
        player.position.y = 1;

        camera.position.copy(player.position);
        camera.position.y = 1.7;
        camera.rotation.set(pitch, yaw, 0, "YXZ");

        zombies.forEach(z => {
          if (z.dead) return;
          const dir = new THREE.Vector3().subVectors(player.position, z.mesh.position);
          dir.y = 0;
          const dist = dir.length();
          dir.normalize();
          z.mesh.position.addScaledVector(dir, z.speed);
          z.mesh.lookAt(player.position.x, z.mesh.position.y, player.position.z);
          z.attackCd -= dt * 1000;
          if (dist < 1.6 && z.attackCd <= 0) {
            damagePlayer(z.damage);
            z.attackCd = 850;
          }
        });

        bullets.forEach((b, i) => {
          b.position.addScaledVector(b.userData.dir, b.userData.speed);
          for (const z of zombies) {
            if (z.dead) continue;
            if (b.position.distanceTo(z.mesh.position) < 1.1) {
              damageZombie(z, b.userData.damage);
              scene.remove(b);
              bullets.splice(i, 1);
              break;
            }
          }
          if (b && b.position.distanceTo(player.position) > 120) {
            scene.remove(b);
            bullets.splice(i, 1);
          }
        });

        coins.forEach((c, i) => {
          c.rotation.z += 0.12;
          if (c.position.distanceTo(player.position) < 1.4) {
            coinsCount += c.userData.value;
            scene.remove(c);
            coins.splice(i, 1);
            updateShopText();
          }
        });

        if (zombies.length === 0 && gameRunning && !gameOver) {
          if (kills > 0) nextWave();
          else spawnWave();
        }
      }

      hud().innerHTML =
        `HEALTH: ${Math.ceil(health)} / ${maxHealth}<br>` +
        `ARMOR: ${armor}<br>` +
        `COINS: ${coinsCount}<br>` +
        `WAVE: ${wave}<br>` +
        `KILLS: ${kills}<br>` +
        `WEAPON: ${weapons[selectedWeapon].name}`;
      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
