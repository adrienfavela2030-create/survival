<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Zombie Forest Nights</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1d3b5c;
      touch-action: none;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,.55);
      border: 3px solid #fff;
      border-radius: 10px;
      padding: 6px 10px;
      font: bold 14px 'Arial';
      color: #fff;
      pointer-events: none;
      z-index: 10;
    }
    .touchBtn {
      position: fixed;
      border-radius: 50%;
      border: 4px solid #000;
      font: bold 18px Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      z-index: 20;
    }
    #jumpBtn {
      bottom: 30px;
      right: 30px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #ffffff, #ffd86a);
    }
    #hitBtn {
      bottom: 36px;
      right: 140px;
      width: 76px;
      height: 76px;
      background: radial-gradient(circle, #ff9b3d, #ff4a00);
      font-size: 16px;
    }
    #stickBase {
      position: fixed;
      bottom: 30px;
      left: 30px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      border: 4px solid rgba(0,0,0,.35);
      touch-action: none;
    }
    #stickKnob {
      position: absolute;
      left: 25px;
      top: 25px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(#59d6ff, #0d6cff);
      border: 3px solid #000;
    }
    #menuScreen {
      position: fixed;
      inset: 0;
      background: #000;
      color: #00ff99;
      font: bold 32px Arial;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }
    #btnStart {
      margin-top: 24px;
      padding: 16px 32px;
      font: bold 18px Arial;
      border-radius: 14px;
      background: #ffda5a;
      border: 4px solid #000;
    }
  </style>
</head>
<body>
  <div id="menuScreen">
    <div>ZOMBIE FOREST NIGHTS</div>
    <button id="btnStart">Start Night 1</button>
  </div>

  <canvas id="gameCanvas"></canvas>
  <div class="hud" id="hud">HEALTH: 100</div>

  <div id="stickBase"><div id="stickKnob"></div></div>
  <button id="hitBtn" class="touchBtn">HIT</button>
  <button id="jumpBtn" class="touchBtn">JUMP</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  <script src="js/map.js"></script>
  <script src="js/zombie.js"></script>

  <script>
    // Game state (global)
    window.game = {
      isDay: true,
      night: 1,
      maxNights: 10,
      health: 100,
      maxHealth: 100,
      hearts: 0,
      coins: 0,
      paused: true,
      move: { x: 0, y: 0 },
      hitPressed: false,
      isJumping: false
    };

    function updateHUD() {
      const hud = document.getElementById("hud");
      hud.innerHTML = `
        NIGHT: ${window.game.isDay ? "DAY" : window.game.night}
        HEALTH: ${window.game.health} / ${window.game.maxHealth}
        HEARTS: ${window.game.hearts}
        COINS: ${window.game.coins}
      `;
    }

    // Start button
    document.getElementById("btnStart").addEventListener("click", () => {
      document.getElementById("menuScreen").style.display = "none";
      window.game.paused = false;
      initMap();          // comes from map.js
      initPlayer();       // put in map.js or player.js
      createZombies();    // comes from zombie.js
      window.game.isDay = true;
      updateDayNight();   // comes from zombie.js
      updateHUD();
      animate();          // comes from zombie.js
    });
  </script>
</body>
</html>
