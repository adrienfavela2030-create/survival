<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Zombie Waves Roblox Mobile</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #7ec8ff;
      font-family: Arial, Helvetica, sans-serif;
      touch-action: none;
      overscroll-behavior: none;
    }
    body { position: fixed; inset: 0; }
    canvas { display: block; width: 100vw !important; height: 100vh !important; image-rendering: pixelated; }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      color: #fff;
    }

    #hud {
      position: absolute;
      top: calc(10px + var(--safe-top));
      left: calc(10px + var(--safe-left));
      background: rgba(0,0,0,.55);
      border: 3px solid rgba(255,255,255,.35);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.35;
      text-shadow: 0 2px 0 #000;
      pointer-events: none;
      min-width: 175px;
    }

    #menuBar {
      position: absolute;
      top: calc(10px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .menuBtn {
      border: 3px solid #000;
      border-radius: 14px;
      padding: 12px 16px;
      background: linear-gradient(#ffd66d, #ff9d1e);
      color: #000;
      font-weight: 900;
      font-size: 15px;
      box-shadow: 0 4px 0 rgba(0,0,0,.3);
      touch-action: manipulation;
    }

    #menuPanel {
      position: absolute;
      top: calc(60px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(360px, calc(100vw - 24px));
      background: rgba(255,255,255,.95);
      border: 4px solid #1d3b5c;
      border-radius: 18px;
      padding: 12px;
      display: none;
      pointer-events: auto;
      color: #111;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    #menuPanel h3 { margin: 0 0 8px 0; }
    #menuPanel button {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border: 3px solid #000;
      border-radius: 12px;
      background: linear-gradient(#8eff9a, #31cc5d);
      font-weight: 900;
      font-size: 15px;
    }

    #shop {
      position: absolute;
      right: calc(10px + var(--safe-right));
      top: calc(10px + var(--safe-top));
      width: min(320px, calc(100vw - 24px));
      background: rgba(0,0,0,.78);
      border: 3px solid #ffd54a;
      border-radius: 16px;
      box-shadow: 0 0 14px rgba(255,213,74,.22);
      padding: 12px;
      display: none;
      pointer-events: auto;
    }

    #shop h3 { margin: 0 0 8px 0; color: #ffd54a; }
    #shop button {
      width: 100%;
      margin: 6px 0;
      padding: 12px;
      border: 3px solid #000;
      border-radius: 12px;
      background: linear-gradient(#ff7b7b, #d72d2d);
      color: white;
      font-weight: 900;
      font-size: 15px;
      touch-action: manipulation;
    }

    #centerMsg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,.82);
      border: 3px solid #ff4df2;
      border-radius: 16px;
      padding: 14px 18px;
      text-align: center;
      display: none;
      pointer-events: none;
      font-size: 18px;
      text-shadow: 0 2px 0 #000;
      max-width: 92vw;
    }

    #hotbar {
      position: absolute;
      left: 50%;
      bottom: calc(14px + var(--safe-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      pointer-events: none;
      z-index: 6;
    }

    .slot {
      width: 110px;
      height: 60px;
      border-radius: 14px;
      border: 4px solid rgba(255,255,255,.35);
      background: rgba(0,0,0,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      text-align: center;
    }

    .slot.active {
      border-color: #ffea00;
      box-shadow: 0 0 14px rgba(255,234,0,.5);
    }

    #touchUI {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: block;
    }

    #stickBase {
      position: absolute;
      left: calc(14px + var(--safe-left));
      bottom: calc(14px + var(--safe-bottom));
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 5px solid rgba(0,0,0,.25);
      pointer-events: auto;
    }

    #stickKnob {
      position: absolute;
      left: 62px;
      top: 62px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(#59d6ff, #0d6cff);
      border: 3px solid #000;
    }

    #jumpBtn {
      position: absolute;
      right: calc(16px + var(--safe-right));
      bottom: calc(18px + var(--safe-bottom));
      width: 108px;
      height: 108px;
      border-radius: 50%;
      border: 5px solid #000;
      background: radial-gradient(circle, #ffffff, #ffd86a);
      color: #111;
      font-size: 18px;
      font-weight: 900;
      pointer-events: auto;
      touch-action: manipulation;
      box-shadow: 0 6px 0 rgba(0,0,0,.35);
    }

    #actionBtn {
      position: absolute;
      left: calc(16px + var(--safe-left));
      bottom: calc(210px + var(--safe-bottom));
      width: 104px;
      height: 104px;
      border-radius: 50%;
      border: 5px solid #000;
      background: radial-gradient(circle, #ffb35c, #ff5e00);
      color: white;
      font-size: 18px;
      font-weight: 900;
      pointer-events: auto;
      touch-action: manipulation;
      box-shadow: 0 6px 0 rgba(0,0,0,.35);
    }

    #lookZone {
      position: absolute;
      left: 38%;
      top: 0;
      width: 62%;
      height: 100%;
      pointer-events: auto;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #7ec8ff 0%, #b6f0ff 50%, #8cd76f 100%);
      color: #0f2c4d;
      text-align: center;
    }

    #loading .card {
      width: min(520px, 92vw);
      background: rgba(255,255,255,.72);
      border: 4px solid #1d3b5c;
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 10px 28px rgba(0,0,0,.15);
    }

    #rotateScreen {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 24px;
    }

    #rotateArrow {
      font-size: 96px;
      color: #00ff99;
      animation: spin 1.2s linear infinite;
      line-height: 1;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      #touchUI { display: block; }
      #lookZone { left: 34%; width: 66%; }
      .slot { width: 94px; height: 54px; font-size: 12px; }
      #stickBase { width: 160px; height: 160px; }
      #actionBtn { width: 92px; height: 92px; bottom: calc(204px + var(--safe-bottom)); }
      #jumpBtn { width: 96px; height: 96px; }
    }
  </style>
</head>
<body>
  <div id="rotateScreen">
    <div id="rotateArrow">↻</div>
    <div style="font-size: 30px; font-weight: 900; color:#00ff99;">Rotate to landscape</div>
    <div style="font-size: 18px; max-width: 520px; line-height:1.5;">This Roblox-style game is built for horizontal play.</div>
  </div>

  <div id="loading">
    <div class="card">
      <h1 style="margin:0 0 10px 0;">Joining world...</h1>
      <p style="margin:0; font-size:18px; line-height:1.5;">Loading starter zones and nearby chunks.</p>
    </div>
  </div>

  <div id="ui">
    <div id="hud"></div>

    <div id="menuBar">
      <button class="menuBtn" id="menuBtn">MENU</button>
    </div>

    <div id="menuPanel">
      <h3>Menu</h3>
      <div style="font-size:14px; line-height:1.45;" id="menuInfo"></div>
      <button id="resumeBtn">Resume</button>
      <button id="shopOpenBtn">Open Shop</button>
      <button id="restartBtn">Restart</button>
    </div>

    <div id="shop">
      <h3>Shop</h3>
      <div id="shopInfo" style="font-size:14px; margin-bottom:8px;"></div>
      <button id="buySword">Buy Sword - 50</button>
      <button id="buyGun">Buy Blaster - 120</button>
      <button id="buyArmor">Buy Armor - 80</button>
      <button id="closeShop">Close</button>
    </div>

    <div id="centerMsg"></div>

    <div id="hotbar">
      <div class="slot active" id="slot1">1 Fists</div>
      <div class="slot" id="slot2">2 Empty</div>
      <div class="slot" id="slot3">3 Empty</div>
    </div>

    <div id="touchUI">
      <div id="stickBase"><div id="stickKnob"></div></div>
      <button id="actionBtn">HIT</button>
      <button id="jumpBtn">JUMP</button>
      <div id="lookZone"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  <script>
    let scene, camera, renderer, clock, player;
    let zombies = [], bullets = [], coins = [], decor = [];
    let generatedChunks = new Set();
    let gameRunning = false, gameOver = false, shopOpen = false, menuOpen = false;
    let wave = 1, kills = 0, coinsCount = 0, health = 100, maxHealth = 100, armor = 0;
    let selectedWeapon = 1, yaw = 0, pitch = -0.2, lastHitTime = 0;
    let unlockedSword = false, unlockedGun = false;
    let verticalVel = 0, grounded = true;
    const gravity = 0.014;
    const keys = {};
    const move = { x: 0, y: 0 };

    const weapons = {
      1: { name: "Fists", damage: 15, range: 2.3, cooldown: 420 },
      2: { name: "Sword", damage: 30, range: 3.2, cooldown: 320 },
      3: { name: "Blaster", damage: 20, range: 100, cooldown: 170 }
    };

    const hud = () => document.getElementById("hud");
    const centerMsg = () => document.getElementById("centerMsg");
    const shopEl = () => document.getElementById("shop");
    const rotateScreen = () => document.getElementById("rotateScreen");
    const menuPanel = () => document.getElementById("menuPanel");

    function chunkKey(cx, cz) { return `${cx},${cz}`; }

    function zombieStats() {
      return { health: 25 + wave * 10, speed: 0.28 + wave * 0.032, damage: 6 + wave * 2 };
    }

    function updateOrientationUI() {
      rotateScreen().style.display = window.innerHeight > window.innerWidth ? "flex" : "none";
    }

    function showCenter(text, time = 1400) {
      centerMsg().textContent = text;
      centerMsg().style.display = "block";
      clearTimeout(showCenter.t);
      showCenter.t = setTimeout(() => centerMsg().style.display = "none", time);
    }

    function updateHotbar() {
      document.getElementById("slot1").textContent = "1 Fists";
      document.getElementById("slot2").textContent = unlockedSword ? "2 Sword" : "2 Empty";
      document.getElementById("slot3").textContent = unlockedGun ? "3 Blaster" : "3 Empty";
      ["slot1","slot2","slot3"].forEach((id, i) => {
        document.getElementById(id).classList.toggle("active", selectedWeapon === i + 1);
      });
    }

    function updateShopText() {
      document.getElementById("shopInfo").innerHTML =
        `Coins: ${coinsCount}<br>Armor: ${armor}<br>Health: ${Math.ceil(health)} / ${maxHealth}<br><br>` +
        `Sword: ${unlockedSword ? "Owned" : "Locked"}<br>Blaster: ${unlockedGun ? "Owned" : "Locked"}`;
    }

    function updateMenuText() {
      document.getElementById("menuInfo").innerHTML =
        `Wave: ${wave}<br>Kills: ${kills}<br>Coins: ${coinsCount}<br>Weapon: ${weapons[selectedWeapon].name}`;
    }

    function toggleMenu(state) {
      menuOpen = state;
      menuPanel().style.display = menuOpen ? "block" : "none";
      if (menuOpen) updateMenuText();
    }

    function toggleShop(state) {
      if (!gameRunning || gameOver) return;
      shopOpen = state;
      shopEl().style.display = shopOpen ? "block" : "none";
      updateShopText();
    }

    function setWeapon(id) {
      if (id === 2 && !unlockedSword) return;
      if (id === 3 && !unlockedGun) return;
      selectedWeapon = id;
      updateHotbar();
      updateMenuText();
    }

    function buyWeapon(id, price) {
      if (coinsCount < price) return showCenter("Not enough coins");
      if (id === 2) unlockedSword = true;
      if (id === 3) unlockedGun = true;
      coinsCount -= price;
      setWeapon(id);
      updateHotbar();
      updateShopText();
      updateMenuText();
    }

    function buyArmorItem() {
      const price = 80;
      if (coinsCount < price) return showCenter("Not enough coins");
      coinsCount -= price;
      armor += 20;
      maxHealth += 20;
      health += 20;
      updateShopText();
      updateMenuText();
    }

    function startGame() {
      if (gameRunning) return;
      gameRunning = true;
      document.getElementById("loading").style.display = "none";
      showCenter("Welcome!");
      generateStarterZones();
      spawnWave();
    }

    function restartAll() {
      zombies.forEach(z => scene.remove(z.mesh));
      bullets.forEach(b => scene.remove(b));
      coins.forEach(c => scene.remove(c));
      decor.forEach(d => scene.remove(d));
      zombies = []; bullets = []; coins = []; decor = [];
      generatedChunks = new Set();
      wave = 1; kills = 0; coinsCount = 0; health = 100; maxHealth = 100; armor = 0;
      unlockedSword = false; unlockedGun = false;
      selectedWeapon = 1; gameOver = false; shopOpen = false; menuOpen = false;
      shopEl().style.display = "none";
      menuPanel().style.display = "none";
      updateHotbar();
      updateShopText();
      updateMenuText();
      generateStarterZones();
      spawnWave();
      showCenter("Restarted");
    }

    function randomSpawnPoint() {
      const radius = 20 + Math.random() * 25;
      const angle = Math.random() * Math.PI * 2;
      return new THREE.Vector3(
        player.position.x + Math.cos(angle) * radius,
        1,
        player.position.z + Math.sin(angle) * radius
      );
    }

    function makeTree(x, z) {
      const group = new THREE.Group();
      const trunk = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 3, 0.7),
        new THREE.MeshLambertMaterial({ color: 0x8b5a2b })
      );
      trunk.position.y = 1.5;
      const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 8, 8),
        new THREE.MeshLambertMaterial({ color: 0x2ca24c })
      );
      leaves.position.y = 3.3;
      group.add(trunk, leaves);
      group.position.set(x, 0, z);
      scene.add(group);
      decor.push(group);
    }

    function makeRock(x, z) {
      const rock = new THREE.Mesh(
        new THREE.DodecahedronGeometry(1.1 + Math.random() * 0.8, 0),
        new THREE.MeshLambertMaterial({ color: 0x777777 })
      );
      rock.position.set(x, 1, z);
      rock.rotation.set(Math.random(), Math.random(), Math.random());
      scene.add(rock);
      decor.push(rock);
    }

    function makeBuilding(x, z) {
      const group = new THREE.Group();
      const base = new THREE.Mesh(
        new THREE.BoxGeometry(5 + Math.random() * 4, 5 + Math.random() * 5, 5 + Math.random() * 4),
        new THREE.MeshLambertMaterial({ color: new THREE.Color().setHSL(Math.random() * 0.15 + 0.55, 0.55, 0.6) })
      );
      base.position.y = base.geometry.parameters.height / 2;
      const roof = new THREE.Mesh(
        new THREE.BoxGeometry(base.geometry.parameters.width + 0.3, 0.8, base.geometry.parameters.depth + 0.3),
        new THREE.MeshLambertMaterial({ color: 0x3a2a22 })
      );
      roof.position.y = base.geometry.parameters.height + 0.4;
      group.add(base, roof);
      group.position.set(x, 0, z);
      scene.add(group);
      decor.push(group);
    }

    function populateChunk(cx, cz) {
      const key = chunkKey(cx, cz);
      if (generatedChunks.has(key)) return;
      generatedChunks.add(key);
      const baseX = cx * 48;
      const baseZ = cz * 48;
      const count = 4 + Math.floor(Math.random() * 4);
      for (let i = 0; i < count; i++) {
        const x = baseX + (Math.random() - 0.5) * 40;
        const z = baseZ + (Math.random() - 0.5) * 40;
        const r = Math.random();
        if (r < 0.5) makeTree(x, z);
        else if (r < 0.8) makeRock(x, z);
        else makeBuilding(x, z);
      }
    }

    function generateStarterZones() {
      for (let cx = -1; cx <= 1; cx++) {
        for (let cz = -1; cz <= 1; cz++) {
          populateChunk(cx, cz);
        }
      }
    }

    function updateChunks() {
      const cx = Math.floor(player.position.x / 48);
      const cz = Math.floor(player.position.z / 48);
      for (let dx = -1; dx <= 1; dx++) {
        for (let dz = -1; dz <= 1; dz++) {
          populateChunk(cx + dx, cz + dz);
        }
      }
    }

    function spawnWave() {
      const count = 3 + wave * 2;
      for (let i = 0; i < count; i++) {
        const s = zombieStats();
        const m = new THREE.Mesh(
          new THREE.BoxGeometry(1, 2, 1),
          new THREE.MeshLambertMaterial({ color: 0x55aa55 })
        );
        m.position.copy(randomSpawnPoint());
        scene.add(m);
        zombies.push({ mesh: m, health: s.health, speed: s.speed, damage: s.damage, attackCd: 0, dead: false });
      }
      showCenter(`Wave ${wave}`);
      updateMenuText();
    }

    function nextWave() {
      wave++;
      showCenter(`Wave ${wave} starts!`);
      spawnWave();
    }

    function damagePlayer(amount) {
      const finalDamage = Math.max(1, amount - armor * 0.15);
      health -= finalDamage;
      if (health <= 0) {
        health = 0;
        gameOver = true;
        showCenter("You died. Open menu to restart.", 999999);
      }
      updateShopText();
      updateMenuText();
    }

    function damageZombie(z, amount) {
      z.health -= amount;
      z.mesh.material.color.setHex(0xff3b3b);
      setTimeout(() => { if (!z.dead) z.mesh.material.color.setHex(0x55aa55); }, 70);
      if (z.health <= 0) killZombie(z);
    }

    function killZombie(z) {
      z.dead = true;
      scene.remove(z.mesh);
      kills++;
      const drop = 10 + Math.floor(Math.random() * 15);
      const coin = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 0.08, 10),
        new THREE.MeshLambertMaterial({ color: 0xffd84d })
      );
      coin.rotation.x = Math.PI / 2;
      coin.position.copy(z.mesh.position);
      coin.position.y = 0.2;
      coin.userData = { value: drop };
      coins.push(coin);
      scene.add(coin);
      zombies = zombies.filter(x => !x.dead);
      updateMenuText();
    }

    function attack() {
      if (!gameRunning || shopOpen || gameOver || menuOpen) return;
      const now = performance.now();
      const w = weapons[selectedWeapon];
      if (now - lastHitTime < w.cooldown) return;
      lastHitTime = now;

      if (selectedWeapon === 3) return shootBullet();

      let hit = false;
      const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      zombies.forEach(z => {
        if (z.dead) return;
        const dist = z.mesh.position.distanceTo(player.position);
        if (dist < w.range + 1) {
          const dir = new THREE.Vector3().subVectors(z.mesh.position, player.position);
          dir.y = 0;
          dir.normalize();
          if (forward.dot(dir) > 0.15) {
            damageZombie(z, w.damage);
            hit = true;
          }
        }
      });
      if (!hit) showCenter("SWING!");
    }

    function shootBullet() {
      const bullet = new THREE.Mesh(
        new THREE.SphereGeometry(0.12, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xfff14f })
      );
      bullet.position.copy(player.position);
      bullet.position.y = 1.6;
      bullet.userData = { dir: new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)), speed: 1.25, damage: weapons[3].damage };
      bullets.push(bullet);
      scene.add(bullet);
    }

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x7ec8ff);
      scene.fog = new THREE.Fog(0x7ec8ff, 20, 180);

      camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.15));
      renderer.setSize(innerWidth, innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.domElement.style.width = "100vw";
      renderer.domElement.style.height = "100vh";
      renderer.domElement.style.imageRendering = "pixelated";
      document.body.appendChild(renderer.domElement);
      clock = new THREE.Clock();

      const sun = new THREE.DirectionalLight(0xffffff, 1.35);
      sun.position.set(10, 18, 8);
      scene.add(sun);
      scene.add(new THREE.AmbientLight(0xbadfff, 0.65));

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(500, 500),
        new THREE.MeshLambertMaterial({ color: 0x85c964 })
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      const grid = new THREE.GridHelper(500, 100, 0x6ebf4a, 0x7cb85d);
      grid.position.y = 0.02;
      scene.add(grid);

      player = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshLambertMaterial({ color: 0xffffff })
      );
      player.position.set(0, 1, 0);
      scene.add(player);

      bindEvents();
      updateOrientationUI();
      updateHotbar();
      updateShopText();
      updateMenuText();
      animate();
      startGame();
    }

    function bindEvents() {
      document.getElementById("menuBtn").onclick = () => toggleMenu(!menuOpen);
      document.getElementById("resumeBtn").onclick = () => toggleMenu(false);
      document.getElementById("shopOpenBtn").onclick = () => { toggleMenu(false); toggleShop(true); };
      document.getElementById("restartBtn").onclick = () => restartAll();
      document.getElementById("closeShop").onclick = () => toggleShop(false);
      document.getElementById("buySword").onclick = () => buyWeapon(2, 50);
      document.getElementById("buyGun").onclick = () => buyWeapon(3, 120);
      document.getElementById("buyArmor").onclick = buyArmorItem;
      document.getElementById("actionBtn").onclick = attack;
      document.getElementById("jumpBtn").onclick = () => { if (grounded && gameRunning && !menuOpen && !shopOpen) verticalVel = 0.24; };

      document.addEventListener("keydown", e => {
        keys[e.key.toLowerCase()] = true;
        if (e.key === "1") setWeapon(1);
        if (e.key === "2") setWeapon(2);
        if (e.key === "3") setWeapon(3);
        if (e.key.toLowerCase() === "m") toggleMenu(!menuOpen);
        if (e.key.toLowerCase() === "b") toggleShop(!shopOpen);
        if (e.key === " ") verticalVel = 0.24;
      });
      document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

      document.addEventListener("mousemove", e => {
        if (!gameRunning || shopOpen || menuOpen || gameOver) return;
        yaw -= e.movementX * 0.0025;
        pitch -= e.movementY * 0.0025;
        pitch = Math.max(-1.1, Math.min(0.35, pitch));
      });
      document.addEventListener("mousedown", attack);

      window.addEventListener("resize", onResize);
      window.addEventListener("orientationchange", updateOrientationUI);

      const stickBase = document.getElementById("stickBase");
      const stickKnob = document.getElementById("stickKnob");
      let tracking = false, startX = 0, startY = 0, maxR = 46;

      const setKnob = (dx, dy) => {
        const len = Math.hypot(dx, dy);
        const clamped = Math.min(len, maxR);
        const ang = Math.atan2(dy, dx);
        const x = Math.cos(ang) * clamped;
        const y = Math.sin(ang) * clamped;
        stickKnob.style.transform = `translate(${x}px, ${y}px)`;
        move.x = x / maxR;
        move.y = y / maxR;
      };

      stickBase.addEventListener("touchstart", e => {
        tracking = true;
        const t = e.touches[0];
        const r = stickBase.getBoundingClientRect();
        startX = r.left + r.width / 2;
        startY = r.top + r.height / 2;
        setKnob(t.clientX - startX, t.clientY - startY);
      }, { passive: false });

      document.addEventListener("touchmove", e => {
        if (!tracking) return;
        const t = e.touches[0];
        setKnob(t.clientX - startX, t.clientY - startY);
        e.preventDefault();
      }, { passive: false });

      document.addEventListener("touchend", () => {
        tracking = false;
        move.x = 0;
        move.y = 0;
        stickKnob.style.transform = "translate(0px, 0px)";
      });

      let looking = false, lastTouchX = 0, lastTouchY = 0;
      const lookZone = document.getElementById("lookZone");
      lookZone.addEventListener("touchstart", e => {
        if (e.touches.length !== 1) return;
        looking = true;
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      }, { passive: false });

      document.addEventListener("touchmove", e => {
        if (!looking || e.touches.length !== 1) return;
        const t = e.touches[0];
        yaw -= (t.clientX - lastTouchX) * 0.004;
        pitch -= (t.clientY - lastTouchY) * 0.004;
        pitch = Math.max(-1.1, Math.min(0.35, pitch));
        lastTouchX = t.clientX;
        lastTouchY = t.clientY;
        e.preventDefault();
      }, { passive: false });

      document.addEventListener("touchend", () => looking = false);
    }

    function onResize() {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      updateOrientationUI();
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      if (gameRunning && !gameOver && !shopOpen && !menuOpen) {
        const speed = 0.12;
        const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
        const right = new THREE.Vector3(forward.z, 0, -forward.x);

        if (keys["w"]) player.position.addScaledVector(forward, speed);
        if (keys["s"]) player.position.addScaledVector(forward, -speed);
        if (keys["a"]) player.position.addScaledVector(right, -speed);
        if (keys["d"]) player.position.addScaledVector(right, speed);

        player.position.addScaledVector(forward, move.y * -0.11);
        player.position.addScaledVector(right, move.x * 0.11);

        verticalVel -= gravity;
        player.position.y += verticalVel;
        if (player.position.y <= 1) {
          player.position.y = 1;
          verticalVel = 0;
          grounded = true;
        } else grounded = false;

        camera.position.copy(player.position);
        camera.position.y = player.position.y + 1.45;
        camera.rotation.set(pitch, yaw, 0, "YXZ");

        updateChunks();

        zombies.forEach(z => {
          if (z.dead) return;
          const dir = new THREE.Vector3().subVectors(player.position, z.mesh.position);
          dir.y = 0;
          const dist = dir.length();
          dir.normalize();
          z.mesh.position.addScaledVector(dir, z.speed);
          z.mesh.lookAt(player.position.x, z.mesh.position.y, player.position.z);
          z.attackCd -= dt * 1000;
          if (dist < 1.6 && z.attackCd <= 0) {
            damagePlayer(z.damage);
            z.attackCd = 850;
          }
        });

        bullets.forEach((b, i) => {
          b.position.addScaledVector(b.userData.dir, b.userData.speed);
          for (const z of zombies) {
            if (z.dead) continue;
            if (b.position.distanceTo(z.mesh.position) < 1.1) {
              damageZombie(z, b.userData.damage);
              scene.remove(b);
              bullets.splice(i, 1);
              break;
            }
          }
          if (b && b.position.distanceTo(player.position) > 140) {
            scene.remove(b);
            bullets.splice(i, 1);
          }
        });

        coins.forEach((c, i) => {
          c.rotation.z += 0.12;
          if (c.position.distanceTo(player.position) < 1.4) {
            coinsCount += c.userData.value;
            scene.remove(c);
            coins.splice(i, 1);
            updateShopText();
            updateMenuText();
          }
        });

        if (zombies.length === 0) nextWave();
      }

      hud().innerHTML =
        `HEALTH: ${Math.ceil(health)} / ${maxHealth}<br>` +
        `ARMOR: ${armor}<br>` +
        `COINS: ${coinsCount}<br>` +
        `WAVE: ${wave}<br>` +
        `KILLS: ${kills}<br>` +
        `WEAPON: ${weapons[selectedWeapon].name}`;

      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
