<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Zombie Waves 3D Maps</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      background: #1d3b5c;
    }
    body { position: fixed; inset: 0; }

    canvas {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
      image-rendering: pixelated;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      color: #fff;
    }

    #hud {
      position: absolute;
      top: max(10px, var(--safe-top));
      left: max(10px, var(--safe-left));
      background: rgba(0,0,0,.55);
      border: 3px solid rgba(255,255,255,.35);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.35;
      text-shadow: 0 2px 0 #000;
      pointer-events: none;
    }

    #menuBar {
      position: absolute;
      top: max(10px, var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .menuBtn {
      border: 3px solid #000;
      border-radius: 14px;
      padding: 12px 16px;
      background: linear-gradient(#ffd66d, #ff9d1e);
      color: #000;
      font-weight: 900;
      font-size: 15px;
      box-shadow: 0 4px 0 rgba(0,0,0,.3);
      touch-action: manipulation;
    }

    #menuPanel {
      position: absolute;
      top: calc(60px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(360px, calc(100vw - 24px));
      background: rgba(255,255,255,.95);
      border: 4px solid #1d3b5c;
      border-radius: 18px;
      padding: 12px;
      display: none;
      pointer-events: auto;
      color: #111;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    #mapSelect {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    #mapSelect button {
      width: auto;
      font-size: 14px;
      padding: 8px 12px;
    }

    #shop {
      position: absolute;
      right: max(10px, var(--safe-right));
      top: max(10px, var(--safe-top));
      width: min(320px, calc(100vw - 24px));
      background: rgba(0,0,0,.78);
      border: 3px solid #ffd54a;
      border-radius: 16px;
      box-shadow: 0 0 14px rgba(255,213,74,.22);
      padding: 12px;
      display: none;
      pointer-events: auto;
    }

    #shop h3 { margin: 0 0 8px 0; color: #ffd54a; }
    #shop button {
      width: 100%;
      margin: 6px 0;
      padding: 12px;
      border: 3px solid #000;
      border-radius: 12px;
      background: linear-gradient(#ff7b7b, #d72d2d);
      color: white;
      font-weight: 900;
      font-size: 15px;
      touch-action: manipulation;
    }

    #centerMsg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,.82);
      border: 3px solid #ff4df2;
      border-radius: 16px;
      padding: 14px 18px;
      text-align: center;
      display: none;
      pointer-events: none;
      font-size: 18px;
      text-shadow: 0 2px 0 #000;
      max-width: 92vw;
    }

    #hotbar {
      position: absolute;
      left: 50%;
      bottom: max(14px, var(--safe-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      pointer-events: none;
      z-index: 6;
    }

    .slot {
      width: 110px;
      height: 60px;
      border-radius: 14px;
      border: 4px solid rgba(255,255,255,.35);
      background: rgba(0,0,0,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      text-align: center;
    }

    .slot.active {
      border-color: #ffea00;
      box-shadow: 0 0 14px rgba(255,234,0,.5);
    }

    #touchUI {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: block;
    }

    #stickBase {
      position: absolute;
      left: max(14px, var(--safe-left));
      bottom: max(14px, var(--safe-bottom));
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 5px solid rgba(0,0,0,.25);
      pointer-events: auto;
    }
    #stickKnob {
      position: absolute;
      left: 62px;
      top: 62px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(#59d6ff, #0d6cff);
      border: 3px solid #000;
    }

    .touchBtn {
      position: absolute;
      border-radius: 50%;
      border: 5px solid #000;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 6px 0 rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #hitBtn {
      left: max(16px, var(--safe-left));
      bottom: max(18px, var(--safe-bottom));
      width: 108px;
      height: 108px;
      background: radial-gradient(circle, #ff9b3d, #ff4a00);
    }

    #jumpBtn {
      right: calc(58px + var(--safe-right));
      bottom: calc(18px + var(--safe-bottom));
      width: 108px;
      height: 108px;
      background: radial-gradient(circle, #fffcee, #ffd8ff);
    }

    #lookZone {
      position: absolute;
      left: 38%;
      top: 0;
      width: 62%;
      height: 100%;
      pointer-events: auto;
    }

    .touchBtn:active {
      transform: scale(0.94);
      box-shadow: 0 4px 0 rgba(0,0,0,.35);
      transition: transform 0.08s ease-in-out, box-shadow 0.08s ease-in-out;
    }
  </style>
</head>
<body>
  <!-- MAP / MENU / SHOP / HUD -->
  <div id="ui">
    <div id="hud"></div>

    <div id="menuBar">
      <button class="menuBtn" id="menuBtn">MAP</button>
    </div>

    <div id="menuPanel">
      <h3>Maps (3)</h3>
      <div id="mapSelect">
        <button id="map1Btn">Map 1 · Normal</button>
        <button id="map2Btn" disabled>Map 2 · Ice Age</button>
        <button id="map3Btn" disabled>Map 3 · Hospital (W20)</button>
      </div>
      <button id="resumeBtn">Resume</button>
    </div>

    <div id="shop">
      <h3>Shop</h3>
      <div id="shopInfo"></div>
      <button id="buySword">Buy Sword - 50</button>
      <button id="buyGun">Buy Blaster - 120</button>
      <button id="buyArmor">Buy Armor - 80</button>
      <button id="closeShop">Close</button>
    </div>

    <div id="centerMsg"></div>

    <div id="hotbar">
      <div class="slot active" id="slot1">1 Fists</div>
      <div class="slot" id="slot2">2 Empty</div>
      <div class="slot" id="slot3">3 Empty</div>
    </div>

    <div id="touchUI">
      <div id="stickBase"><div id="stickKnob"></div></div>
      <button id="hitBtn" class="touchBtn">HIT</button>
      <button id="jumpBtn" class="touchBtn">JUMP</button>
      <div id="lookZone"></div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  <script>
    // WORLD STATE
    let currentMap = 1, mapLocked = { map2: true, map3: true };
    let scene, camera, renderer, clock;

    // 3D CHARACTER (Roblox style block skeleton)
    let playerModel, playerBody, playerHead, playerLegs, walkTime = 0;

    // Game entities
    let zombies = [], bullets = [], coins = [], decor = [];
    let gameRunning = false, gameOver = false, shopOpen = false, menuOpen = false;
    let wave = 1, kills = 0, coinsCount = 0, health = 100, maxHealth = 100, armor = 0;
    let selectedWeapon = 1;
    let yaw = 0, pitch = -0.2, lastHitTime = 0;
    let unlockedSword = false, unlockedGun = false;
    let verticalVel = 0, grounded = true;
    const gravity = 0.014;
    const keys = {};
    const move = { x: 0, y: 0 };

    const weapons = {
      1: { name: "Fists", damage: 15, range: 2.3, cooldown: 420 },
      2: { name: "Sword", damage: 30, range: 3.2, cooldown: 320 },
      3: { name: "Blaster", damage: 20, range: 100, cooldown: 170 }
    };

    const hud = () => document.getElementById("hud");
    const centerMsg = () => document.getElementById("centerMsg");
    const menuPanel = () => document.getElementById("menuPanel");
    const shopEl = () => document.getElementById("shop");

    const map1Btn = () => document.getElementById("map1Btn");
    const map2Btn = () => document.getElementById("map2Btn");
    const map3Btn = () => document.getElementById("map3Btn");

    function showCenter(text, time = 1400) {
      centerMsg().textContent = text;
      centerMsg().style.display = "block";
      clearTimeout(showCenter.t);
      showCenter.t = setTimeout(() => centerMsg().style.display = "none", time);
    }

    function showMapLocked() {
      if (wave < 10) {
        map2Btn().disabled = true;
        map2Btn().style.opacity = 0.5;
      } else {
        map2Btn().disabled = false;
        map2Btn().style.opacity = 1;
        if (wave >= 20 && currentMap === 2) {
          map3Btn().disabled = false;
          map3Btn().style.opacity = 1;
          showCenter("Hantavirus Hospital unlocked!", 2000);
        }
      }
    }

    function updateHotbar() {
      document.getElementById("slot1").textContent = "1 Fists";
      document.getElementById("slot2").textContent = unlockedSword ? "2 Sword" : "2 Empty";
      document.getElementById("slot3").textContent = unlockedGun ? "3 Blaster" : "3 Empty";
      ["slot1","slot2","slot3"].forEach((id, i) => {
        document.getElementById(id).classList.toggle("active", selectedWeapon === i + 1);
      });
    }

    function updateShopText() {
      document.getElementById("shopInfo").innerHTML =
        `Coins: ${coinsCount}<br>Armor: ${armor}<br>Health: ${Math.ceil(health)} / ${maxHealth}<br><br>` +
        `Sword: ${unlockedSword ? "Owned" : "Locked"}<br>Blaster: ${unlockedGun ? "Owned" : "Locked"}`;
    }

    function switchMap(newMap) {
      if (!gameRunning) return;

      // clear old world
      decor.forEach(obj => scene.remove(obj));
      zombies.forEach(z => scene.remove(z.mesh));
      decor = [];
      zombies = [];

      currentMap = newMap;

      // MAP 1: Normal city / forest
      if (newMap === 1) {
        scene.background = new THREE.Color(0x7ec8ff);
        scene.fog = new THREE.Fog(0x7ec8ff, 20, 180);
        const ground = new THREE.Mesh(
          new THREE.PlaneGeometry(300, 300),
          new THREE.MeshLambertMaterial({ color: 0x85c964 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        decor.push(ground);

        const grid = new THREE.GridHelper(300, 60, 0x6ebf4a, 0x7cb85d);
        grid.position.y = 0.02;
        scene.add(grid);
        decor.push(grid);

        for (let i = 0; i < 40; i++) {
          const x = (Math.random() - 0.5) * 220;
          const z = (Math.random() - 0.5) * 220;
          const r = Math.random();
          const group = new THREE.Group();
          group.position.set(x, 0, z);
          if (r < 0.4) {
            // simple tree
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.6, 3, 0.6), new THREE.MeshLambertMaterial({ color: 0x8b5a2b }));
            trunk.position.y = 1.5;
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.3, 8, 8), new THREE.MeshLambertMaterial({ color: 0x2ca24c }));
            leaves.position.y = 3.2;
            group.add(trunk, leaves);
          } else if (r < 0.7) {
            // rock
            const rock = new THREE.Mesh(
              new THREE.DodecahedronGeometry(1.2 + Math.random() * 0.5, 0),
              new THREE.MeshLambertMaterial({ color: 0x777777 })
            );
            rock.position.y = 1;
            rock.rotation.set(Math.random(), Math.random(), Math.random());
            group.add(rock);
          } else {
            // small building
            const base = new THREE.Mesh(
              new THREE.BoxGeometry(5 + Math.random() * 3, 4 + Math.random() *
