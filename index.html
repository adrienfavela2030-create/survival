<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Zombie Waves 3D</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1d3b5c;
    }
    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,.55);
      border: 3px solid #fff;
      border-radius: 10px;
      padding: 6px 10px;
      font: bold 14px 'Arial';
      color: #fff;
      pointer-events: none;
      z-index: 10;
    }
    .touchBtn {
      position: absolute;
      border-radius: 50%;
      border: 4px solid #000;
      font: bold 18px Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    #hitBtn {
      bottom: 40px;
      left: 20px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #ff9b3d, #ff4a00);
    }
    #jumpBtn {
      bottom: 40px;
      right: 20px;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, #ffffff, #ffd86a);
    }
    #stickBase {
      position: absolute;
      bottom: 40px;
      left: 20px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,.2);
      border: 4px solid rgba(0,0,0,.35);
      touch-action: none;
    }
    #stickKnob {
      position: absolute;
      left: 40px;
      top: 40px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(#59d6ff, #0d6cff);
      border: 3px solid #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div class="hud">HEALTH: 100<br>WAVE: 1</div>
  <div id="stickBase"><div id="stickKnob"></div></div>
  <button id="hitBtn" class="touchBtn">HIT</button>
  <button id="jumpBtn" class="touchBtn">JUMP</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let player, zombies = [];
    const move = { x: 0, y: 0 };

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x7ec8ff);

      const fov = 75;
      const aspect = window.innerWidth / window.innerHeight;
      camera = new THREE.PerspectiveCamera(fov, aspect, 0.1, 1000);

      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("gameCanvas"), antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

      window.addEventListener("resize", () => {
        const width = window.innerWidth;
        const height = window.innerHeight;
        renderer.setSize(width, height);
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
      });

      // Light
      const sun = new THREE.DirectionalLight(0xffffff, 1.2);
      sun.position.set(10, 20, 8);
      scene.add(sun);
      scene.add(new THREE.AmbientLight(0x8fb3ff, 0.4));

      // Ground
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100),
        new THREE.MeshLambertMaterial({ color: 0x88cc66 })
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      // Player
      player = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshLambertMaterial({ color: 0xff4444 })
      );
      player.position.y = 1;
      scene.add(player);

      // Zombies
      for (let i = 0; i < 5; i++) {
        const z = new THREE.Mesh(
          new THREE.BoxGeometry(1, 2, 1),
          new THREE.MeshLambertMaterial({ color: 0x55aa55 })
        );
        const r = 20;
        z.position.set(
          (Math.random() - 0.5) * 2 * r,
          1,
          (Math.random() - 0.5) * 2 * r
        );
        scene.add(z);
        zombies.push(z);
      }

      // Start camera
      camera.position.set(0, 5, 10);
      camera.lookAt(player.position);

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);

      // Joystick movement
      const speed = 0.25;
      player.position.x += move.x * speed;
      player.position.z += move.y * speed;

      // Keep zombies near by
      zombies.forEach(z => {
        const dir = new THREE.Vector3()
          .subVectors(player.position, z.position)
          .normalize();
        z.position.addScaledVector(dir, 0.06);
        z.lookAt(player.position);
      });

      renderer.render(scene, camera);
    }

    // Joystick
    const base = document.getElementById("stickBase");
    const kn = document.getElementById("stickKnob");
    let tracking = false;
    const radius = 30;

    base.addEventListener("touchstart", e => {
      e.preventDefault();
      tracking = true;
    });

    document.addEventListener("touchmove", e => {
      if (!tracking) return;
      e.preventDefault();
      const rect = base.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const tx = e.touches[0].clientX;
      const ty = e.touches[0].clientY;
      let dx = tx - cx;
      let dy = ty - cy;
      const len = Math.hypot(dx, dy);
      if (len > radius) {
        const ang = Math.atan2(dy, dx);
        dx = Math.cos(ang) * radius;
        dy = Math.sin(ang) * radius;
      }
      kn.style.transform = `translate(${dx}px, ${dy}px)`;
      move.x = dx / radius;
      move.y = dy / radius;
    }, { passive: false });

    document.addEventListener("touchend", () => {
      tracking = false;
      move.x = 0;
      move.y = 0;
      kn.style.transform = "translate(0px, 0px)";
    });

    init();
  </script>
</body>
</html>
