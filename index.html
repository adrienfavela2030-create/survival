<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Zombie Waves Roblox Mobile</title>
  <style>
    :root {
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --safe-right: env(safe-area-inset-right);
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
    }
    body { position: fixed; inset: 0; }

    #loadingScreen {
      position: fixed;
      inset: 0;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #00ff99;
      flex-direction: column;
      font-family: Arial, sans-serif;
    }

    #loadingScreen h1 {
      font-size: 32px;
      font-weight: 900;
      margin: 0 0 12px 0;
    }

    #loadingScreen p {
      font-size: 18px;
      max-width: 520px;
      text-align: center;
      line-height: 1.5;
    }

    canvas {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
      image-rendering: pixelated;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      color: #fff;
    }

    #hud {
      position: absolute;
      top: max(10px, var(--safe-top));
      left: max(10px, var(--safe-left));
      background: rgba(0,0,0,.55);
      border: 3px solid rgba(255,255,255,.35);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.35;
      text-shadow: 0 2px 0 #000;
      pointer-events: none;
    }

    #menuBar {
      position: absolute;
      top: max(10px, var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .menuBtn {
      border: 3px solid #000;
      border-radius: 14px;
      padding: 12px 16px;
      background: linear-gradient(#ffd66d, #ff9d1e);
      color: #000;
      font-weight: 900;
      font-size: 15px;
      box-shadow: 0 4px 0 rgba(0,0,0,.3);
      touch-action: manipulation;
    }

    #menuPanel {
      position: absolute;
      top: calc(60px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      width: min(360px, calc(100vw - 24px));
      background: rgba(255,255,255,.95);
      border: 4px solid #1d3b5c;
      border-radius: 18px;
      padding: 12px;
      display: none;
      pointer-events: auto;
      color: #111;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }

    #menuPanel h3 { margin: 0 0 8px 0; }
    #menuPanel button {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border: 3px solid #000;
      border-radius: 12px;
      background: linear-gradient(#8eff9a, #31cc5d);
      font-weight: 900;
      font-size: 15px;
    }

    #shop {
      position: absolute;
      right: max(10px, var(--safe-right));
      top: max(10px, var(--safe-top));
      width: min(320px, calc(100vw - 24px));
      background: rgba(0,0,0,.78);
      border: 3px solid #ffd54a;
      border-radius: 16px;
      box-shadow: 0 0 14px rgba(255,213,74,.22);
      padding: 12px;
      display: none;
      pointer-events: auto;
    }

    #shop h3 { margin: 0 0 8px 0; color: #ffd54a; }
    #shop button {
      width: 100%;
      margin: 6px 0;
      padding: 12px;
      border: 3px solid #000;
      border-radius: 12px;
      background: linear-gradient(#ff7b7b, #d72d2d);
      color: white;
      font-weight: 900;
      font-size: 15px;
      touch-action: manipulation;
    }

    #centerMsg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,.82);
      border: 3px solid #ff4df2;
      border-radius: 16px;
      padding: 14px 18px;
      text-align: center;
      display: none;
      pointer-events: none;
      font-size: 18px;
      text-shadow: 0 2px 0 #000;
      max-width: 92vw;
    }

    #hotbar {
      position: absolute;
      left: 50%;
      bottom: max(14px, var(--safe-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      pointer-events: none;
      z-index: 6;
    }

    .slot {
      width: 110px;
      height: 60px;
      border-radius: 14px;
      border: 4px solid rgba(255,255,255,.35);
      background: rgba(0,0,0,.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      text-align: center;
    }

    .slot.active {
      border-color: #ffea00;
      box-shadow: 0 0 14px rgba(255,234,0,.5);
    }

    #touchUI {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: block;
    }

    #stickBase {
      position: absolute;
      left: max(14px, var(--safe-left));
      bottom: max(14px, var(--safe-bottom));
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      border: 5px solid rgba(0,0,0,.25);
      pointer-events: auto;
    }

    #stickKnob {
      position: absolute;
      left: 62px;
      top: 62px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(#59d6ff, #0d6cff);
      border: 3px solid #000;
    }

    .touchBtn {
      position: absolute;
      border-radius: 50%;
      border: 5px solid #000;
      color: #fff;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 6px 0 rgba(0,0,0,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #jumpBtn {
      right: calc(58px + var(--safe-right));
      bottom: calc(18px + var(--safe-bottom));
      width: 108px;
      height: 108px;
      background: radial-gradient(circle, #ffffff, #ffd86a);
    }

    #hitBtn {
      left: max(16px, var(--safe-left));
      bottom: max(18px, var(--safe-bottom));
      width: 108px;
      height: 108px;
      background: radial-gradient(circle, #ff9b3d, #ff4a00);
    }

    #lookZone {
      position: absolute;
      left: 38%;
      top: 0;
      width: 62%;
      height: 100%;
      pointer-events: auto;
    }

    #rotateScreen {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 24px;
    }

    #rotateArrow {
      font-size: 96px;
      color: #00ff99;
      animation: spin 1.2s linear infinite;
      line-height: 1;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) {
      #touchUI { display: block; }
      #lookZone { left: 34%; width: 66%; }
      .slot { width: 94px; height: 54px; font-size: 12px; }
      #stickBase { width: 160px; height: 160px; }
      #hitBtn { width: 96px; height: 96px; bottom: calc(18px + var(--safe-bottom)); }
      #jumpBtn { width: 96px; height: 96px; }
    }

    .touchBtn:active, .touchBtn:touch {
      transform: scale(0.94);
      box-shadow: 0 4px 0 rgba(0,0,0,.35);
      transition: transform 0.08s ease-in-out, box-shadow 0.08s ease-in-out;
    }
  </style>
</head>
<body>
  <div id="loadingScreen">
    <h1>LOADING MAP</h1>
    <p>Initializing world, zombies, and shop.</p>
  </div>

  <div id="rotateScreen">
    <div id="rotateArrow">↻</div>
    <div style="font-size: 30px; font-weight: 900; color:#00ff99;">Rotate to landscape</div>
    <div style="font-size: 18px; max-width: 520px; line-height:1.5;">This Roblox‑style game is built for horizontal play.</div>
  </div>

  <div id="ui">
    <div id="hud"></div>

    <div id="menuBar">
      <button class="menuBtn" id="menuBtn">MENU</button>
    </div>

    <div id="menuPanel">
      <h3>Menu</h3>
      <div id="menuInfo" style="font-size:14px; line-height:1.45;"></div>
      <button id="resumeBtn">Resume</button>
      <button id="shopOpenBtn">Open Shop</button>
      <button id="restartBtn">Restart</button>
    </div>

    <div id="shop">
      <h3>Shop</h3>
      <div id="shopInfo" style="font-size:14px; margin-bottom:8px;"></div>
      <button id="buySword">Buy Sword - 50</button>
      <button id="buyGun">Buy Blaster - 120</button>
      <button id="buyArmor">Buy Armor - 80</button>
      <button id="closeShop">Close</button>
    </div>

    <div id="centerMsg"></div>

    <div id="hotbar">
      <div class="slot active" id="slot1">1 Fists</div>
      <div class="slot" id="slot2">2 Empty</div>
      <div class="slot" id="slot3">3 Empty</div>
    </div>

    <div id="touchUI">
      <div id="stickBase"><div id="stickKnob"></div></div>
      <button id="hitBtn" class="touchBtn">HIT</button>
      <button id="jumpBtn" class="touchBtn">JUMP</button>
      <div id="lookZone"></div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  <script>
    let scene, camera, renderer, clock;
    let player, playerHead, playerBody, playerLegs;
    let zombies = [], bullets = [], coins = [], decor = [];
    let gameRunning = false, gameOver = false, shopOpen = false, menuOpen = false;
    let wave = 1, kills = 0, coinsCount = 0, health = 100, maxHealth = 100, armor = 0;
    let selectedWeapon = 1, yaw = 0, pitch = -0.2, lastHitTime = 0;
    let unlockedSword = false, unlockedGun = false;
    let verticalVel = 0, grounded = true;
    const gravity = 0.014;
    const keys = {};
    const move = { x: 0, y: 0 };

    const weapons = {
      1: { name: "Fists", damage: 15, range: 2.3, cooldown: 420 },
      2: { name: "Sword", damage: 30, range: 3.2, cooldown: 320 },
      3: { name: "Blaster", damage: 20, range: 100, cooldown: 170 }
    };

    const hud = () => document.getElementById("hud");
    const centerMsg = () => document.getElementById("centerMsg");
    const shopEl = () => document.getElementById("shop");
    const rotateScreen = () => document.getElementById("rotateScreen");
    const menuPanel = () => document.getElementById("menuPanel");
    const loadingScreen = () => document.getElementById("loadingScreen");

    function zombieStats() {
      return { health: 25 + wave * 10, speed: 0.28 + wave * 0.032, damage: 6 + wave * 2 };
    }

    function updateOrientationUI() {
      const isPortrait = window.innerHeight > window.innerWidth;
      rotateScreen().style.display = isPortrait ? "flex" : "none";
    }

    function showCenter(text, time = 1400) {
      centerMsg().textContent = text;
      centerMsg().style.display = "block";
      clearTimeout(showCenter.t);
      showCenter.t = setTimeout(() => centerMsg().style.display = "none", time);
    }

    function updateHotbar() {
      document.getElementById("slot1").textContent = "1 Fists";
      document.getElementById("slot2").textContent = unlockedSword ? "2 Sword" : "2 Empty";
      document.getElementById("slot3").textContent = unlockedGun ? "3 Blaster" : "3 Empty";
      ["slot1","slot2","slot3"].forEach((id, i) => {
        document.getElementById(id).classList.toggle("active", selectedWeapon === i + 1);
      });
    }

    function updateShopText() {
      document.getElementById("shopInfo").innerHTML =
        `Coins: ${coinsCount}<br>Armor: ${armor}<br>Health: ${Math.ceil(health)} / ${maxHealth}<br><br>` +
        `Sword: ${unlockedSword ? "Owned" : "Locked"}<br>Blaster: ${unlockedGun ? "Owned" : "Locked"}`;
    }

    function updateMenuText() {
      document.getElementById("menuInfo").innerHTML =
        `Wave: ${wave}<br>Kills: ${kills}<br>Coins: ${coinsCount}<br>Weapon: ${weapons[selectedWeapon].name}`;
    }

    function toggleMenu(state) {
      menuOpen = state;
      menuPanel().style.display = menuOpen ? "block" : "none";
      if (menuOpen) updateMenuText();
    }

    function toggleShop(state) {
      if (!gameRunning || gameOver) return;
      shopOpen = state;
      shopEl().style.display = shopOpen ? "block" : "none";
      updateShopText();
    }

    function setWeapon(id) {
