<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Zombie Forest Nights (3D)</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      background: #1d3b5c; touch-action: none;
      -webkit-touch-callout: none; user-select: none;
    }
    #gameCanvas { display: block; width: 100vw; height: 100vh; }

    /* Bottom HUD - Centered */
    .bottom-hud {
      position: absolute;
      bottom: 170px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      pointer-events: none;
      text-align: center;
    }
    .health-bar-container {
      background: rgba(0,0,0,0.75);
      border: 3px solid #fff;
      border-radius: 10px;
      padding: 6px 15px;
      margin-bottom: 10px;
      min-width: 280px;
    }
    .health-bar {
      height: 26px;
      background: linear-gradient(to right, #ff2222, #00ff00);
      border-radius: 5px;
      transition: width 0.3s ease;
    }
    .health-text {
      color: white;
      font: bold 15px Arial;
      text-align: center;
      margin-top: 4px;
      text-shadow: 0 0 5px black;
    }

    .hotbar {
      display: flex;
      gap: 12px;
      justify-content: center;
      background: rgba(0,0,0,0.8);
      border: 3px solid #fff;
      border-radius: 12px;
      padding: 10px;
      width: fit-content;
      margin: 0 auto;
    }
    .slot {
      width: 60px;
      height: 60px;
      background: rgba(255,255,255,0.15);
      border: 3px solid #666;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: white;
    }
    .slot.active {
      border-color: #ffd700;
      box-shadow: 0 0 15px #ffd700;
      background: rgba(255,215,0,0.25);
    }

    /* Controls */
    .touchBtn {
      position: fixed; border-radius: 50%; border: 4px solid #000;
      font: bold 18px Arial; display: flex; align-items: center; justify-content: center;
      touch-action: manipulation; color: #000;
    }
    #jumpBtn {
      bottom: 30px; right: 30px; width: 100px; height: 100px;
      background: radial-gradient(circle, #ffffff, #ffd86a);
    }
    #hitBtn {
      bottom: 36px; right: 150px; width: 76px; height: 76px;
      background: radial-gradient(circle, #ff9b3d, #ff4a00);
    }
    #stickBase {
      position: fixed; bottom: 30px; left: 30px; width: 90px; height: 90px;
      border-radius: 50%; background: rgba(255,255,255,.2);
      border: 4px solid rgba(0,0,0,.35);
    }
    #stickKnob {
      position: absolute; left: 25px; top: 25px; width: 40px; height: 40px;
      border-radius: 50%; background: linear-gradient(#59d6ff, #0d6cff);
      border: 3px solid #000;
    }

    #menuScreen {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95); color: #00ff99;
      font: bold 32px Arial; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 30;
    }
    button { margin-top: 30px; padding: 15px 40px; font-size: 24px; cursor: pointer; }
  </style>
</head>
<body>
  <!-- MENU -->
  <div id="menuScreen">
    <h1>ZOMBIE FOREST NIGHTS</h1>
    <button id="btnStart">Start Night 1</button>
  </div>

  <!-- GAME CANVAS -->
  <canvas id="gameCanvas"></canvas>

  <!-- BOTTOM HUD -->
  <div class="bottom-hud">
    <div class="health-bar-container">
      <div id="healthBar" class="health-bar" style="width: 100%;"></div>
      <div id="healthText" class="health-text">HEALTH: 100 / 100</div>
    </div>
    
    <div class="hotbar" id="hotbar">
      <div class="slot active" id="slot1">👊</div>
      <div class="slot" id="slot2">⬜</div>
      <div class="slot" id="slot3">⬜</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div id="stickBase"><div id="stickKnob"></div></div>
  <button id="hitBtn" class="touchBtn">HIT</button>
  <button id="jumpBtn" class="touchBtn">JUMP</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r160/three.min.js"></script>
  <script>
    let scene, camera, renderer, player;
    let zombies = [];
    let game = {
      health: 100,
      maxHealth: 100,
      night: 1
    };

    function updateHUD() {
      const percent = (game.health / game.maxHealth) * 100;
      document.getElementById("healthBar").style.width = percent + "%";
      document.getElementById("healthText").textContent = `HEALTH: ${Math.floor(game.health)} / ${game.maxHealth}`;
    }

    function createMap() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x7ec8ff);
      scene.fog = new THREE.Fog(0x7ec8ff, 50, 220);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("gameCanvas"), antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

      // Lights
      const sun = new THREE.DirectionalLight(0xffffff, 1.2);
      sun.position.set(10, 30, 10);
      scene.add(sun);
      scene.add(new THREE.AmbientLight(0x8fb3ff, 0.5));

      // Ground
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(400, 400),
        new THREE.MeshLambertMaterial({ color: 0x00aa00 })
      );
      ground.rotation.x = -Math.PI / 2;
      scene.add(ground);

      // Trees
      for (let i = 0; i < 60; i++) {
        const x = (Math.random() - 0.5) * 300;
        const z = (Math.random() - 0.5) * 300;
        const h = 4 + Math.random() * 3;

        const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.6, h, 0.6), new THREE.MeshLambertMaterial({ color: 0x8b5a2b }));
        trunk.position.set(x, h/2, z);
        scene.add(trunk);

        const leaves = new THREE.Mesh(new THREE.SphereGeometry(2, 6, 6), new THREE.MeshLambertMaterial({ color: 0x228822 }));
        leaves.position.set(x, h + 1, z);
        scene.add(leaves);
      }

      // Player
      player = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 2, 1.2),
        new THREE.MeshLambertMaterial({ color: 0xff4444 })
      );
      player.position.set(0, 1, 10);
      scene.add(player);

      camera.position.set(0, 8, 18);
      camera.lookAt(player.position);

      updateHUD();
      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      if (player) camera.lookAt(player.position);
      renderer.render(scene, camera);
    }

    // Start button
    document.getElementById("btnStart").addEventListener("click", () => {
      document.getElementById("menuScreen").style.display = "none";
      createMap();
    });

    // Resize handler
    window.addEventListener("resize", () => {
      if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    });
  </script>
</body>
</html>
